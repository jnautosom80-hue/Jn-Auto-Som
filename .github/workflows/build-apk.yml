name: Gerar APK Android Auto Oficial

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar codigo do repositorio
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Baixar e Configurar Ferramentas do Android SDK
      uses: android-actions/setup-android@v3

    - name: Criar Projeto Android Estruturado Oficial
      run: |
        # Cria um projeto limpo usando o CLI oficial do Capacitor que configura o Gradle perfeitamente
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android
        
        # Cria a pasta www onde vai o seu site e garante o arquivo index principal
        mkdir -p www
        cp index.html www/index.html 2>/dev/null || true
        cp -r * www/ 2>/dev/null || true
        rm -f www/package.json www/package-lock.json
        
        # Inicializa a estrutura nativa sem pular nenhuma pasta oculta do Google
        npx cap init "JN Auto Som" "com.jnautosom80.meuapp" --web-dir=www
        npx cap add android

    - name: Injetar as configuracoes do Android Auto
      run: |
        # Localiza o manifesto correto criado pelo sistema e injeta a tag do carro antes do fechamento do app
        MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
        sed -i '/<\/application>/i \        <meta-data android:name="com.google.android.gms.car.application" android:resource="@xml/automotive_app_desc"/>' $MANIFEST_PATH
        
        # Cria a pasta de recursos XML oficial e copia o descritor do carro
        mkdir -p android/app/src/main/res/xml/
        cp automotive_app_desc.xml android/app/src/main/res/xml/automotive_app_desc.xml

    - name: Sincronizar e Dar Permissoes de Compilacao
      run: |
        npx cap sync android
        cd android
        chmod +x gradlew

    - name: Compilar APK Final Sem Erros
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon

    - name: Disponibilizar APK Oficial para Download
      uses: actions/upload-artifact@v4
      with:
        name: jn-auto-som-apk-oficial
        path: android/app/build/outputs/apk/debug/app-debug.apk
