name: Gerar APK Android Auto

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar codigo do repositorio
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Configurar ferramentas do Android
      uses: android-actions/setup-android@v3

    - name: Criar estrutura nativa Android
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/android
        # Cria uma pasta real com arquivos minimos para evitar erro de build vazia
        mkdir -p www
        echo '<!DOCTYPE html><html><head><meta charset="utf-8"></head><body></body></html>' > www/blank.html
        cp index.html www/index.html 2>/dev/null || true
        cp -r * www/ 2>/dev/null || true
        # Inicializa o projeto vinculando a pasta criada
        npx cap init "JN Auto Som" "com.jnautosom80.meuapp" --web-dir=www
        npx cap add android

    - name: Injetar as configuracoes do Android Auto
      run: |
        MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
        # Injeta o metadado do carro antes do fechamento da tag application
        sed -i '/<\/application>/i \        <meta-data android:name="com.google.android.gms.car.application" android:resource="@xml/automotive_app_desc"/>' $MANIFEST_PATH
        mkdir -p android/app/src/main/res/xml/
        cp automotive_app_desc.xml android/app/src/main/res/xml/automotive_app_desc.xml

    - name: Sincronizar e preparar Gradle
      run: |
        npx cap sync android
        cd android
        chmod +x gradlew

    - name: Executar Compilacao Oficial do APK
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Disponibilizar APK para Download
      uses: actions/upload-artifact@v4
      with:
        name: jn-auto-som-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
