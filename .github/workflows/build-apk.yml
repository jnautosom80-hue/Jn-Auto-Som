name: Gerar APK Android Auto

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar codigo do repositorio
      uses: actions/checkout@v4

    - name: Configurar Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Organizar arquivos na pasta WWW
      run: |
        mkdir -p www
        # Move apenas os arquivos HTML e do site para dentro de 'www'
        cp index.html manifest.json sw.js www/ 2>/dev/null || true
        # Se tiver mais arquivos soltos (pastas de vídeo/estilo), copia também
        cp -r assets css js img www/ 2>/dev/null || true

    - name: Inicializar Projeto Web e Instalar Capacitor
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli
        npx cap init "JN Auto Som" "com.jnautosom80.meuapp" --web-dir=www
        npm install @capacitor/android
        npx cap add android

    - name: Injetar as configuracoes do Android Auto
      run: |
        MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
        sed -i '/<\/application>/i \        <meta-data android:name="com.google.android.gms.car.application" android:resource="@xml/automotive_app_desc"/>' $MANIFEST_PATH
        mkdir -p android/app/src/main/res/xml/
        cp automotive_app_desc.xml android/app/src/main/res/xml/automotive_app_desc.xml

    - name: Sincronizar Arquivos HTML para a pasta do Android
      run: |
        npx cap sync android

    - name: Compilar APK Final (Debug)
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon

    - name: Disponibilizar APK para Download
      uses: actions/upload-artifact@v4
      with:
        name: jn-auto-som-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
