name: Gerar APK Android Auto Oficial

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar codigo do repositorio
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Baixar e Configurar Ferramentas do Android SDK
      uses: android-actions/setup-android@v3

    - name: Construir Estrutura Nativa do Aplicativo
      run: |
        mkdir -p app/src/main/assets/www
        mkdir -p app/src/main/res/xml
        
        cp index.html app/src/main/assets/www/ 2>/dev/null || true
        cp manifest.json app/src/main/assets/www/ 2>/dev/null || true
        cp sw.js app/src/main/assets/www/ 2>/dev/null || true
        cp *.png app/src/main/assets/www/ 2>/dev/null || true
        
        cp automotive_app_desc.xml app/src/main/res/xml/automotive_app_desc.xml

        cat <<EOF > app/src/main/AndroidManifest.xml
        <manifest xmlns:android="http://android.com" package="com.jnautosom80.meuapp">
            <application android:label="JN Auto Som" android:supportsRtl="true">
                <meta-data android:name="com.google.android.gms.car.application" android:resource="@xml/automotive_app_desc"/>
                <activity android:name=".MainActivity" android:exported="true" android:theme="@android:style/Theme.NoTitleBar.Fullscreen">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN"/>
                        <category android:name="android.intent.category.LAUNCHER"/>
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        mkdir -p app/src/main/java/com/jnautosom80/meuapp
        cat <<EOF > app/src/main/java/com/jnautosom80/meuapp/MainActivity.java
        package com.jnautosom80.meuapp;
        import android.app.Activity;
        import android.os.Bundle;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;

        public class MainActivity extends Activity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                WebView webView = new WebView(this);
                webView.getSettings().setJavaScriptEnabled(true);
                webView.setWebViewClient(new WebViewClient());
                webView.loadUrl("file:///android_asset/www/index.html");
                setContentView(webView);
            }
        }
        EOF

        cat <<EOF > build.gradle
        buildscript {
            repositories { google() \n mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects { repositories { google() \n mavenCentral() } }
        EOF

        cat <<EOF > settings.gradle
        include ':app'
        EOF

        cat <<EOF > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.jnautosom80.meuapp'
            compileSdk 34
            defaultConfig {
                applicationId "com.jnautosom80.meuapp"
                minSdk 23
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        EOF

    - name: Dar permissao de execucao ao Gradle
      run: gradle wrapper --gradle-version 8.5

    - name: Compilar APK Final Nativo (Debug)
      run: ./gradlew assembleDebug --no-daemon

    - name: Disponibilizar APK Oficial para Download
      uses: actions/upload-artifact@v4
      with:
        name: jn-auto-som-apk-oficial
        path: app/build/outputs/apk/debug/app-debug.apk
